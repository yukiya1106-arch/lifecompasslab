<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ライフプラン電卓｜LIFE COMPASS LAB｜Preview</title><style>body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f2f6fb;color:#0a2247;display:grid;place-items:center;min-height:100vh;margin:0}p{font-weight:700}.error{max-width:720px;margin:24px;padding:24px;border:1px solid #d7e2ef;border-radius:16px;background:#fff;line-height:1.8}.error small{display:block;margin-top:10px;color:#66758a;font-weight:400}</style></head><body><p id="loading">ライフプラン電卓を読み込んでいます…</p><script>
(async()=>{const names=['part-0.txt','part-1.txt','part-2.txt','part-3.txt','part-4.txt'];const b=(await Promise.all(names.map(async n=>{const r=await fetch(n+'?v=2',{cache:'no-store'});if(!r.ok)throw new Error(n);return r.text()}))).join('');const bytes=Uint8Array.from(atob(b),c=>c.charCodeAt(0));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));let html=await new Response(stream).text();html=html.replace('"react-dom/client": "https://esm.sh/react-dom@19.2.0/client"','"react-dom": "https://esm.sh/react-dom@19.2.0",\n      "react-dom/client": "https://esm.sh/react-dom@19.2.0/client"');html=html.replace('<div id="root"></div>','<div id="root"></div><script>window.addEventListener("error",function(e){if(!document.getElementById("root").innerHTML){document.body.innerHTML="<div class=\\"error\\"><strong>画面の読み込みに失敗しました。</strong><small>ブラウザを更新しても改善しない場合は、エラー内容と一緒にお知らせください："+(e.message||"unknown error")+"</small></div>"}});<\/script>');document.open();document.write(html);document.close()})().catch(e=>{document.body.innerHTML='<div class="error"><strong>読み込みに失敗しました。</strong><small>'+String(e.message||e)+'</small></div>';console.error(e)});
</script></body></html>
