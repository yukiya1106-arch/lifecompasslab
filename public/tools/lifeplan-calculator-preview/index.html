<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ライフプラン電卓｜LIFE COMPASS LAB｜Preview</title><style>body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f2f6fb;color:#0a2247;display:grid;place-items:center;min-height:100vh;margin:0}p{font-weight:700}</style></head><body><p>ライフプラン電卓を読み込んでいます…</p><script>
(async()=>{const names=['part-0.txt','part-1.txt','part-2.txt','part-3.txt','part-4.txt'];const b=(await Promise.all(names.map(async n=>{const r=await fetch(n,{cache:'no-store'});if(!r.ok)throw new Error(n);return r.text()}))).join('');const bytes=Uint8Array.from(atob(b),c=>c.charCodeAt(0));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const html=await new Response(stream).text();document.open();document.write(html);document.close()})().catch(e=>{document.body.innerHTML='<p>読み込みに失敗しました。ブラウザを更新してください。</p>';console.error(e)});
</script></body></html>
