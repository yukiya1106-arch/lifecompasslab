<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ライフプラン電卓｜LIFE COMPASS LAB｜Preview</title><style>body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f2f6fb;color:#0a2247;display:grid;place-items:center;min-height:100vh;margin:0}p{font-weight:700}.error{max-width:720px;margin:24px;padding:24px;border:1px solid #d7e2ef;border-radius:16px;background:#fff;line-height:1.8}.error small{display:block;margin-top:10px;color:#66758a;font-weight:400}</style></head><body><p id="loading">ライフプラン電卓を読み込んでいます…</p><script>
(async()=>{const names=['part-0.txt','part-1.txt','part-2.txt','part-3.txt','part-4.txt'];const b=(await Promise.all(names.map(async n=>{const r=await fetch(n+'?v=3',{cache:'no-store'});if(!r.ok)throw new Error(n);return r.text()}))).join('');const bytes=Uint8Array.from(atob(b),c=>c.charCodeAt(0));const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));let html=await new Response(stream).text();html=html.replace('"react-dom/client": "https://esm.sh/react-dom@19.2.0/client"','"react-dom": "https://esm.sh/react-dom@19.2.0",\n      "react-dom/client": "https://esm.sh/react-dom@19.2.0/client"');const bridge=`<script>
(()=>{
 const ASSET_LABEL='資産運用';
 const LEGACY_URL='../lifeplan-calculator/?embedded=asset&v=3';
 let overlay=null;
 const text=e=>(e.textContent||'').replace(/\\s+/g,'').trim();
 const closeOverlay=()=>{if(overlay)overlay.style.display='none'};
 const openOverlay=(button)=>{
   if(!overlay){
     overlay=document.createElement('div');
     overlay.id='lc-original-asset-overlay';
     Object.assign(overlay.style,{position:'fixed',left:'0',right:'0',bottom:'0',zIndex:'45',background:'#f2f6fb',padding:'12px',boxSizing:'border-box',overflow:'hidden'});
     const frame=document.createElement('iframe');
     frame.title='資産運用シミュレーション';
     frame.src=LEGACY_URL;
     Object.assign(frame.style,{width:'100%',height:'100%',border:'0',borderRadius:'18px',background:'#fff',boxShadow:'0 12px 36px rgba(10,34,71,.14)'});
     overlay.appendChild(frame);
     document.body.appendChild(overlay);
     frame.addEventListener('load',()=>{
       let tries=0;
       const prepare=()=>{
         tries++;
         try{
           const doc=frame.contentDocument;
           if(!doc)return;
           const assetButton=[...doc.querySelectorAll('button')].find(b=>text(b)===ASSET_LABEL);
           if(assetButton){
             assetButton.click();
             const style=doc.createElement('style');
             style.textContent='header,footer{display:none!important}body{background:#fff!important}main{max-width:none!important;padding:12px 16px 40px!important;margin:0!important}.no-print{display:none!important}';
             doc.head.appendChild(style);
             doc.documentElement.style.background='#fff';
             return;
           }
         }catch(e){console.error('asset bridge',e)}
         if(tries<50)setTimeout(prepare,150);
       };
       prepare();
     });
   }
   const rect=button.getBoundingClientRect();
   overlay.style.top=Math.max(112,Math.ceil(rect.bottom+12))+'px';
   overlay.style.display='block';
 };
 const wire=()=>{
   [...document.querySelectorAll('button')].forEach(btn=>{
     if(btn.dataset.lcAssetBridge)return;
     const label=text(btn);
     if(label===ASSET_LABEL){
       btn.dataset.lcAssetBridge='asset';
       btn.addEventListener('click',()=>setTimeout(()=>openOverlay(btn),30),true);
     }else if(['生活費逆算','住宅ローン','住宅ローン控除'].includes(label)){
       btn.dataset.lcAssetBridge='other';
       btn.addEventListener('click',closeOverlay,true);
     }
   });
 };
 new MutationObserver(wire).observe(document.documentElement,{childList:true,subtree:true});
 wire();
})();
<\/script>`;html=html.replace('</body>',bridge+'</body>');html=html.replace('<div id="root"></div>','<div id="root"></div><script>window.addEventListener("error",function(e){if(!document.getElementById("root").innerHTML){document.body.innerHTML="<div class=\\"error\\"><strong>画面の読み込みに失敗しました。</strong><small>ブラウザを更新しても改善しない場合は、エラー内容と一緒にお知らせください："+(e.message||"unknown error")+"</small></div>"}});<\/script>');document.open();document.write(html);document.close()})().catch(e=>{document.body.innerHTML='<div class="error"><strong>読み込みに失敗しました。</strong><small>'+String(e.message||e)+'</small></div>';console.error(e)});
</script></body></html>
