<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>資産運用｜ライフプラン電卓</title>
<style>
:root{--navy:#0a2b5f;--navy2:#123f7d;--blue:#347fe2;--blue2:#256bc0;--pale:#b8daf7;--bg:#f2f6fb;--line:#d7e2ef;--text:#0a2247;--muted:#66758a;--white:#fff}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}button,input,a{font:inherit}button,a{touch-action:manipulation}
.hero{position:relative;overflow:hidden;background:linear-gradient(120deg,var(--navy) 0%,var(--navy2) 100%);color:#fff;padding:20px 20px 92px}.hero:after{content:"";position:absolute;right:-120px;bottom:-210px;width:520px;height:520px;border:1px solid rgba(105,170,245,.35);border-radius:50%;pointer-events:none}.hero-inner{position:relative;z-index:1;max-width:1140px;margin:auto}.top{display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:900;letter-spacing:.01em}.brand-mark{display:grid;place-items:center;width:34px;height:34px;border:1px solid #66a8f4;border-radius:50%;color:#8fc1ff;font-size:15px}.brand-sub{color:#71b0f4;font-size:12px;font-weight:800}.tools{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 18px;border:0;border-radius:999px;background:#fff;color:var(--navy);font-weight:900;text-decoration:none}.app-nav{display:flex;align-items:center;gap:4px;width:max-content;max-width:100%;margin-top:20px;padding:4px;border:1px solid rgba(159,196,239,.25);border-radius:13px;background:rgba(4,31,70,.24);overflow-x:auto}.nav-btn{flex:none;min-height:42px;padding:0 16px;border:0;border-radius:9px;background:transparent;color:#d8e8fa;font-size:13px;font-weight:800;white-space:nowrap}.nav-btn.active{background:#fff;color:var(--navy);box-shadow:0 3px 10px rgba(0,0,0,.16)}.eyebrow{margin:32px 0 8px;color:#8fc2fb;font-size:12px;font-weight:900;letter-spacing:.15em}.hero h1{margin:0;font-size:clamp(34px,5vw,54px);line-height:1.1;letter-spacing:-.02em}.hero-copy{margin:12px 0 0;color:#d7e7f8;font-size:14px;line-height:1.75}
.wrap{position:relative;z-index:2;max-width:1080px;margin:-48px auto 40px;padding:0 14px}.panel{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 40px rgba(10,34,71,.09);overflow:hidden}.tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;padding:14px;border-bottom:1px solid var(--line);background:#fff}.tab{min-height:62px;border:1px solid #d8e3ef;border-radius:12px;background:#f2f5f9;color:#627086;font-size:14px;font-weight:800;line-height:1.35;padding:10px}.tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
.body{padding:22px}.section-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.section-head h2{margin:0;font-size:22px}.section-head p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.6}.reset{min-height:42px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--muted);padding:8px 13px;font-weight:800}.layout{display:grid;grid-template-columns:minmax(0,1fr) 280px;gap:20px;align-items:start}.fields{display:grid;gap:11px}.field{display:grid;grid-template-columns:160px 150px minmax(220px,1fr);gap:12px;align-items:center;padding:12px 14px;border:1px solid #dce6f1;border-radius:14px;background:#f7faff;min-width:0}.label{font-weight:800}.numwrap{position:relative;min-width:0}.numwrap input{width:100%;min-width:0;height:46px;border:1px solid #cbd8e8;border-radius:10px;background:#fff;padding:0 50px 0 12px;color:var(--text);font-size:19px;font-weight:900;text-align:right;-moz-appearance:textfield}.numwrap input::-webkit-outer-spin-button,.numwrap input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}.unit{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);font-weight:800;pointer-events:none}.range{display:grid;grid-template-columns:40px minmax(110px,1fr) 40px;gap:9px;align-items:center;min-width:0}.step{width:40px;height:40px;border:0;border-radius:50%;background:var(--blue2);color:#fff;font-size:24px;font-weight:900;line-height:1}.range input[type=range]{width:100%;min-width:0;accent-color:var(--blue)}
.answer{border:1px solid #cfe0f3;border-radius:16px;background:#f7faff;overflow:hidden}.answer-label{padding:18px 14px;background:#edf5fd;text-align:center;font-weight:800;line-height:1.6;white-space:pre-line}.answer-value{padding:28px 12px;text-align:center;color:#ef5664;font-size:34px;font-weight:900}.warning{padding:0 14px 18px;color:#a34848;font-size:12px;text-align:center;line-height:1.6}.summary{display:grid;grid-template-columns:280px minmax(0,1fr);gap:20px;margin-top:22px}.breakdown{border:1px solid var(--line);border-radius:16px;background:#fff;overflow:hidden}.breakdown-title{padding:10px 14px;background:#57a8e6;color:#fff;font-size:21px;font-weight:900;text-align:center}.total{padding:16px 14px;border-bottom:1px solid var(--line);text-align:center}.total small{display:block;font-weight:800}.total strong{display:block;margin-top:4px;font-size:30px}.rows{padding:12px 14px;background:#f7f7f8}.row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;font-weight:800}.row span:first-child{display:flex;align-items:center;gap:8px}.sw{display:inline-block;width:14px;height:14px;border-radius:2px}.sw.p{background:var(--pale)}.sw.g{background:var(--blue2)}
.chart-card{border:1px solid var(--line);border-radius:16px;background:#fff;padding:18px;min-width:0}.chart-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.chart-head h3{margin:0;font-size:18px}.chart-head p{margin:5px 0 0;color:var(--muted);font-size:12px;line-height:1.6}.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;font-weight:700;color:#40516a}.legend span{display:flex;align-items:center;gap:6px}.chart-scroll{overflow-x:auto;margin-top:14px}.chart-stage{position:relative;min-width:620px;height:342px;border-bottom:1px solid var(--line);padding:0 8px 38px}.tip{position:absolute;left:10px;top:4px;z-index:2;min-width:190px;padding:10px 12px;border:1px solid #cddbed;border-radius:12px;background:rgba(255,255,255,.98);box-shadow:0 10px 26px rgba(10,34,71,.12);font-size:12px}.tip strong{font-size:13px}.tip-line{display:flex;justify-content:space-between;gap:16px;line-height:1.8}.tip-period{margin-bottom:4px;color:var(--blue);font-weight:900}.bars{height:292px;display:flex;align-items:flex-end;gap:8px}.barcol{position:relative;flex:1 0 22px;min-width:22px;max-width:42px;height:292px;display:flex;align-items:flex-end}.barbtn{width:100%;height:292px;padding:0;border:0;background:transparent;display:flex;align-items:flex-end;cursor:pointer}.stack{width:100%;display:flex;flex-direction:column;justify-content:flex-end;border-radius:5px 5px 2px 2px;overflow:hidden}.gain{background:var(--blue2)}.principal{background:var(--pale);min-height:1px}.barbtn.selected .stack,.barbtn:focus-visible .stack{box-shadow:0 0 0 3px rgba(47,124,229,.15)}.xlabel{position:absolute;top:300px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:800;color:#55708f;white-space:nowrap}.note{margin-top:12px;color:#718097;font-size:11px;line-height:1.6;text-align:right}
@media(max-width:900px){.field{grid-template-columns:140px 140px minmax(180px,1fr)}}
@media(max-width:820px){.hero{padding:16px 14px 78px}.brand{font-size:13px}.brand-sub{display:block}.tools{min-height:38px;padding:0 14px}.app-nav{width:100%}.tabs{grid-template-columns:repeat(2,minmax(0,1fr))}.layout,.summary{grid-template-columns:1fr}.field{grid-template-columns:1fr;gap:8px}.numwrap{max-width:none}.answer{max-width:none}.body{padding:16px}.chart-head{display:block}.legend{margin-top:10px}}
@media(max-width:480px){.top{align-items:flex-start}.brand{align-items:flex-start;flex-wrap:wrap;max-width:230px}.brand-mark{width:30px;height:30px}.hero h1{font-size:36px}.hero-copy{font-size:13px}.nav-btn{padding:0 13px}.tabs{padding:10px;gap:6px}.tab{min-height:58px;font-size:12px}.field{padding:11px}.body{padding:12px}.section-head h2{font-size:21px}.answer-value{font-size:28px}.breakdown-title{font-size:18px}.total strong{font-size:26px}}
</style>
</head>
<body>
<section class="hero"><div class="hero-inner">
<div class="top"><div class="brand"><span class="brand-mark">◇</span><span>LIFE COMPASS LAB <span class="brand-sub">ライフプラン電卓</span></span></div><a class="tools" href="../" target="_top">ツール一覧</a></div>
<nav class="app-nav" aria-label="ライフプラン電卓の機能"><button class="nav-btn" data-nav="living">▣　生活費逆算</button><button class="nav-btn" data-nav="mortgage">⌂　住宅ローン</button><button class="nav-btn" data-nav="deduction">▤　住宅ローン控除</button><button class="nav-btn active" aria-current="page">⌁　資産運用</button></nav>
<div class="eyebrow">YOUR FINANCIAL ROUTE · ASSET PLANNING</div><h1>資産形成を試算する</h1><p class="hero-copy">積立額・運用期間・想定利回りから、将来資産または必要積立額を整理します。</p>
</div></section>
<main class="wrap"><section class="panel">
<div class="tabs" id="tabs"></div>
<div class="body">
<div class="section-head"><div><h2>資産形成の条件</h2><p>4つの計算方法を切り替えて、必要な条件を確認できます。</p></div><button class="reset" id="reset">入力をリセット</button></div>
<div class="layout"><div class="fields" id="fields"></div><aside class="answer"><div class="answer-label" id="answerLabel"></div><div class="answer-value" id="answerValue"></div><div class="warning" id="warning"></div></aside></div>
<div class="summary">
<section class="breakdown"><div class="breakdown-title" id="periodTitle"></div><div class="total"><small>積立元本 ＋ 運用で増えた額</small><strong id="totalValue"></strong></div><div class="rows"><div class="row"><span><i class="sw p"></i>積立元本</span><b id="principalValue"></b></div><div class="row"><span><i class="sw g"></i>運用で増えた額</span><b id="gainValue"></b></div></div></section>
<section class="chart-card"><div class="chart-head"><div><h3>積立元本と運用成果の推移</h3><p>棒全体が資産額です。元本と運用で増えた金額を分けて表示します。</p></div><div class="legend"><span><i class="sw p"></i>積立元本</span><span><i class="sw g"></i>運用で増えた額</span></div></div><div class="chart-scroll"><div class="chart-stage"><div class="tip" id="tip"></div><div class="bars" id="bars"></div></div></div><div class="note">各棒を選択すると、その時点の内訳を確認できます。</div></section>
</div></div></section></main>
<script>
(()=>{
const modes=[{tab:'将来いくらになるか',label:'入力条件で積立した場合\n最終積立金額は'},{tab:'積立期間を計算する',label:'目標金額を達成するには'},{tab:'毎月積立額を計算する',label:'目標金額を達成するには'},{tab:'利回りを計算する',label:'目標金額を達成するには'}];
const defs={target:{label:'目標額',unit:'万円',min:0,max:10000,step:10},monthly:{label:'毎月積立額',unit:'万円',min:0,max:100,step:.1},years:{label:'積立期間',unit:'年',min:1,max:50,step:1},rate:{label:'利回り（年率）',unit:'%',min:0,max:20,step:.1}};
const defaults={target:1000,monthly:3,years:20,rate:2};let state={...defaults};let mode=0;
const tabs=document.getElementById('tabs'),fields=document.getElementById('fields');
const fmtYen=v=>Math.round(v).toLocaleString('ja-JP')+'円';const fmtMan=v=>(v/10000).toLocaleString('ja-JP',{maximumFractionDigits:1})+'万円';
const mr=annual=>Math.pow(1+annual/100,1/12)-1;const fv=(monthly,annual,months)=>{const r=mr(annual);return Math.abs(r)<1e-12?monthly*months:monthly*(Math.pow(1+r,months)-1)/r};
const requiredMonthly=(target,annual,months)=>{const r=mr(annual);return Math.abs(r)<1e-12?target/months:target*r/(Math.pow(1+r,months)-1)};
const requiredMonths=(target,monthly,annual)=>{for(let n=1;n<=1200;n++)if(fv(monthly,annual,n)>=target)return n;return 1200};
const requiredRate=(target,monthly,months)=>{const principal=monthly*months;if(target<=principal)return 0;let lo=0,hi=50;if(fv(monthly,hi,months)<target)return 50;for(let i=0;i<80;i++){const mid=(lo+hi)/2;if(fv(monthly,mid,months)>=target)hi=mid;else lo=mid}return hi};
const decimals=step=>{const s=String(step);return s.includes('.')?s.split('.')[1].length:0};const rounded=(value,step)=>{const p=10**decimals(step);return Math.round(value*p)/p};
function activeKeys(){return mode===0?['monthly','years','rate']:mode===1?['target','monthly','rate']:mode===2?['target','years','rate']:['target','monthly','years']}
function renderTabs(){tabs.innerHTML='';modes.forEach((m,i)=>{const b=document.createElement('button');b.className='tab'+(i===mode?' active':'');b.textContent=m.tab;b.onclick=()=>{mode=i;render()};tabs.appendChild(b)})}
function makeField(key){const d=defs[key],row=document.createElement('div');row.className='field';row.innerHTML=`<div class="label">${d.label}</div><div class="numwrap"><input type="number" inputmode="decimal" min="${d.min}" max="${d.max}" step="${d.step}" value="${state[key]}"><span class="unit">${d.unit}</span></div><div class="range"><button type="button" class="step minus">−</button><input type="range" min="${d.min}" max="${d.max}" step="${d.step}" value="${state[key]}"><button type="button" class="step plus">＋</button></div>`;const num=row.querySelector('input[type=number]'),range=row.querySelector('input[type=range]');const set=value=>{const parsed=Number(value);const safe=Number.isFinite(parsed)?parsed:d.min;const next=rounded(Math.min(d.max,Math.max(d.min,safe)),d.step);state[key]=next;num.value=String(next);range.value=String(next);calculate()};num.oninput=e=>set(e.target.value);range.oninput=e=>set(e.target.value);row.querySelector('.minus').onclick=()=>set(state[key]-d.step);row.querySelector('.plus').onclick=()=>set(state[key]+d.step);return row}
function renderFields(){fields.innerHTML='';activeKeys().forEach(k=>fields.appendChild(makeField(k)))}
function result(){let months=Math.round(state.years*12),monthly=state.monthly*10000,rate=state.rate,total=0,warning='';if(mode===0){total=fv(monthly,rate,months)}else if(mode===1){months=requiredMonths(state.target*10000,monthly,rate);total=fv(monthly,rate,months);if(months>=1200)warning='100年以内に目標額へ届かない条件です。'}else if(mode===2){monthly=requiredMonthly(state.target*10000,rate,months);total=fv(monthly,rate,months)}else{rate=requiredRate(state.target*10000,monthly,months);total=fv(monthly,rate,months);if(rate>=50)warning='必要利回りが50%以上となる条件です。'}const principal=monthly*months,gain=Math.max(0,total-principal);return{months,monthly,rate,total,principal,gain,warning}}
function periodLabel(months){const y=Math.floor(months/12),m=months%12;return m?`${y}年${m}か月目`:`${y}年目`}
function answerText(r){if(mode===0)return fmtMan(r.total);if(mode===1){const y=Math.floor(r.months/12),m=r.months%12;return m?`${y}年${m}か月`:`${y}年`;}if(mode===2)return Math.ceil(r.monthly).toLocaleString('ja-JP')+'円';return r.rate.toFixed(1)+'%'}
function points(r){const arr=[];for(let m=12;m<=r.months;m+=12)arr.push(m);if(!arr.length||arr[arr.length-1]!==r.months)arr.push(r.months);return arr.map(m=>{const principal=r.monthly*m,total=fv(r.monthly,r.rate,m);return{m,principal,gain:Math.max(0,total-principal),total}})}
function showTip(p,button){document.querySelectorAll('.barbtn').forEach(b=>b.classList.remove('selected'));if(button)button.classList.add('selected');document.getElementById('tip').innerHTML=`<div class="tip-period">${periodLabel(p.m)}</div><div class="tip-line"><span>積立元本</span><strong>${fmtYen(p.principal)}</strong></div><div class="tip-line"><span>運用で増えた額</span><strong>${fmtYen(p.gain)}</strong></div><div class="tip-line"><span>合計</span><strong>${fmtYen(p.total)}</strong></div>`}
function draw(r){const data=points(r),max=Math.max(...data.map(x=>x.total),1),bars=document.getElementById('bars');bars.innerHTML='';document.querySelector('.chart-stage').style.minWidth=Math.max(620,data.length*32)+'px';const marks=new Set([0,Math.floor((data.length-1)/2),data.length-1]);data.forEach((p,i)=>{const h=Math.max(2,Math.round(p.total/max*260)),ph=Math.max(1,Math.round(p.principal/p.total*h)),gh=Math.max(0,h-ph),col=document.createElement('div'),b=document.createElement('button');col.className='barcol';b.type='button';b.className='barbtn'+(i===data.length-1?' selected':'');b.innerHTML=`<span class="stack" style="height:${h}px"><span class="gain" style="height:${gh}px"></span><span class="principal" style="height:${ph}px"></span></span>`;b.onmouseenter=b.onfocus=b.onclick=()=>showTip(p,b);col.appendChild(b);if(marks.has(i)){const x=document.createElement('span');x.className='xlabel';x.textContent=periodLabel(p.m);col.appendChild(x)}bars.appendChild(col)});showTip(data[data.length-1],bars.querySelector('.barbtn:last-of-type'))}
function calculate(){const r=result();document.getElementById('answerLabel').textContent=modes[mode].label;document.getElementById('answerValue').textContent=answerText(r);document.getElementById('warning').textContent=r.warning;document.getElementById('periodTitle').textContent=periodLabel(r.months);document.getElementById('totalValue').textContent=fmtYen(r.total);document.getElementById('principalValue').textContent=fmtYen(r.principal);document.getElementById('gainValue').textContent=fmtYen(r.gain);draw(r)}
function render(){renderTabs();renderFields();calculate()}
document.getElementById('reset').onclick=()=>{state={...defaults};render()};document.querySelectorAll('[data-nav]').forEach(button=>button.onclick=()=>parent.postMessage('lc-nav-'+button.dataset.nav,'*'));render();
})();
</script>
</body>
</html>
